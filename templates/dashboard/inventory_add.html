{% extends "base.html" %}

{% block title %}Add Item - Billico{% endblock %}

{% block page_title %}Add Inventory Item{% endblock %}

{% block content %}
<div class="add-item-page">
    <div class="row">
        <div class="col-md-8 mx-auto">
            <div class="card">
                <div class="card-body">
                    {% include 'components/alerts.html' %}

                    <form method="POST" action="{{ url_for('inventory.add') }}">
                        <div class="row">
                            <div class="col-md-6 mb-3">
                                <label for="item_name" class="form-label">Item Name *</label>
                                <input type="text" class="form-control" id="item_name" name="item_name"
                                    value="{{ form_data.item_name if form_data else '' }}" required>
                            </div>

                            <div class="col-md-6 mb-3">
                                <label for="sku" class="form-label">SKU</label>
                                <input type="text" class="form-control" id="sku" name="sku"
                                    value="{{ form_data.sku if form_data else '' }}">
                            </div>
                        </div>

                        <div class="mb-3">
                            <label for="description" class="form-label">Description</label>
                            <textarea class="form-control" id="description" name="description"
                                rows="3">{{ form_data.description if form_data else '' }}</textarea>
                        </div>

                        <div class="row">
                            <div class="col-md-4 mb-3">
                                <label for="quantity" class="form-label">Quantity *</label>
                                <input type="number" class="form-control" id="quantity" name="quantity"
                                    value="{{ form_data.quantity if form_data else '0' }}" min="0" required>
                            </div>

                            <div class="col-md-4 mb-3">
                                <label for="unit_price" class="form-label">Unit Price *</label>
                                <input type="number" class="form-control" id="unit_price" name="unit_price"
                                    value="{{ form_data.unit_price if form_data else '0' }}" step="0.01" min="0"
                                    required>
                            </div>

                            <div class="col-md-4 mb-3">
                                <label for="reorder_level" class="form-label">Reorder Level</label>
                                <input type="number" class="form-control" id="reorder_level" name="reorder_level"
                                    value="{{ form_data.reorder_level if form_data else '10' }}" min="0">
                            </div>
                        </div>

                        <div class="row">
                            <div class="col-md-6 mb-3">
                                <label for="category_id" class="form-label">Category</label>
                                <select class="form-control" id="category_id" name="category_id">
                                    <option value="">Select Category</option>
                                    {% for category in categories %}
                                    <option value="{{ category.id }}" {% if form_data and
                                        form_data.category_id==category.id|string %}selected{% endif %}>
                                        {{ category.name }}
                                    </option>
                                    {% endfor %}
                                </select>
                            </div>

                            <div class="col-md-6 mb-3">
                                <label for="supplier_id" class="form-label">Supplier</label>
                                <select class="form-control" id="supplier_id" name="supplier_id">
                                    <option value="">Select Supplier</option>
                                    {% for supplier in suppliers %}
                                    <option value="{{ supplier.id }}" {% if form_data and
                                        form_data.supplier_id==supplier.id|string %}selected{% endif %}>
                                        {{ supplier.name }}
                                    </option>
                                    {% endfor %}
                                </select>
                            </div>
                        </div>

                        <div class="mb-3">
                            <label for="location" class="form-label">Location</label>
                            <input type="text" class="form-control" id="location" name="location"
                                value="{{ form_data.location if form_data else '' }}"
                                placeholder="e.g. Warehouse A, Shelf 5">
                        </div>

                        <div class="d-flex justify-content-between align-items-center">
                            <a href="{{ url_for('inventory.index') }}" class="btn btn-secondary">
                                <i class="bi bi-arrow-left me-2"></i>Cancel
                            </a>
                            <button type="submit" class="btn btn-primary">
                                <i class="bi bi-check-circle me-2"></i>Add Item
                            </button>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
