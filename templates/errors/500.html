{% extends "base.html" %}

{% block title %}500 - Server Error{% endblock %}

{% block body %}
<div class="auth-wrapper">
    <div class="text-center text-white">
        <h1 class="display-1 fw-bold">500</h1>
        <h2 class="mb-4">Internal Server Error</h2>
        <p class="lead mb-4">Something went wrong on our end. We're working to fix it!</p>
        <a href="{{ url_for('dashboard.index') if current_user.is_authenticated else url_for('auth.login') }}"
            class="btn btn-lg" style="background: white; color: #667EEA;">
            <i class="bi bi-house me-2"></i>Go Home
        </a>
    </div>
</div>
{% endblock %}
