{% extends "base.html" %}

{% block title %}404 - Page Not Found{% endblock %}

{% block body %}
<div class="auth-wrapper">
    <div class="text-center text-white">
        <h1 class="display-1 fw-bold">404</h1>
        <h2 class="mb-4">Page Not Found</h2>
        <p class="lead mb-4">Sorry, the page you're looking for doesn't exist.</p>
        <a href="{{ url_for('dashboard.index') if current_user.is_authenticated else url_for('auth.login') }}"
            class="btn btn-lg" style="background: white; color: #667EEA;">
            <i class="bi bi-house me-2"></i>Go Home
        </a>
    </div>
</div>
{% endblock %}
